<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#00c8e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AtMoS" />

  <!-- SEO & Description -->
  <title>AtMoS — OmniVerse Sovereign Health</title>
  <meta name="description" content="نظام المراقبة الحيوية السيادي: قياس النبض والـ HRV والتنفس محلياً بدون إنترنت" />

  <!-- Security: block camera/mic from iframes -->
  <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(self), accelerometer=(self), gyroscope=(self)" />

  <!-- Prevent phone number detection, etc. -->
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="background-color" content="#0a0e27" />

  <!-- Preconnect to MediaPipe CDN (only needed if online) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
